<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-label="Placeholder — the Neare sensor plugged into a wall in a warm living room, with a phone on a nearby table showing a gentle daily summary.">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF8F2"/>
      <stop offset="1" stop-color="#E8E0D0"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2ECDF"/>
      <stop offset="1" stop-color="#E2D8C4"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9B99A"/>
      <stop offset="1" stop-color="#B09978"/>
    </linearGradient>
    <radialGradient id="lamp" cx=".5" cy=".3" r=".8">
      <stop offset="0" stop-color="#FFF4D6" stop-opacity=".85"/>
      <stop offset="1" stop-color="#FFF4D6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulse2" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#8FA68E" stop-opacity=".35"/>
      <stop offset="1" stop-color="#8FA68E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="960" height="560" rx="28" fill="url(#bg2)"/>

  <!-- wall / floor -->
  <rect x="0" y="0" width="960" height="400" fill="url(#wall)"/>
  <rect x="0" y="400" width="960" height="160" fill="url(#floor)"/>
  <line x1="0" y1="400" x2="960" y2="400" stroke="#8B7452" stroke-opacity=".25"/>

  <!-- warm lamp glow -->
  <circle cx="760" cy="140" r="260" fill="url(#lamp)"/>

  <!-- framed picture on wall -->
  <g>
    <rect x="120" y="90" width="150" height="180" rx="4" fill="#fff" stroke="#8B7452" stroke-opacity=".35" stroke-width="3"/>
    <rect x="134" y="104" width="122" height="152" fill="#C9D4C8"/>
    <circle cx="195" cy="170" r="28" fill="#8FA68E" opacity=".7"/>
    <path d="M134 230 L170 195 L200 215 L230 180 L256 210 L256 256 L134 256 Z" fill="#6E8A6D" opacity=".6"/>
  </g>

  <!-- side table -->
  <g>
    <rect x="340" y="340" width="260" height="12" rx="2" fill="#7A6443"/>
    <rect x="360" y="352" width="8" height="80" fill="#7A6443"/>
    <rect x="572" y="352" width="8" height="80" fill="#7A6443"/>
  </g>

  <!-- plant -->
  <g transform="translate(680,240)">
    <ellipse cx="40" cy="140" rx="48" ry="8" fill="#000" opacity=".08"/>
    <rect x="12" y="100" width="56" height="44" rx="4" fill="#C87A5C"/>
    <path d="M40 100 Q10 60 20 20 Q30 50 40 90" fill="#6E8A6D"/>
    <path d="M40 100 Q70 60 60 15 Q52 50 40 90" fill="#8FA68E"/>
    <path d="M40 100 Q40 60 40 10" stroke="#6E8A6D" stroke-width="2" fill="none"/>
  </g>

  <!-- radar pulse around sensor -->
  <circle cx="470" cy="320" r="160" fill="url(#pulse2)"/>
  <circle cx="470" cy="320" r="100" fill="none" stroke="#8FA68E" stroke-opacity=".3" stroke-width="1.2"/>
  <circle cx="470" cy="320" r="66" fill="none" stroke="#8FA68E" stroke-opacity=".4" stroke-width="1.2"/>

  <!-- the sensor on the table -->
  <g>
    <rect x="440" y="280" width="60" height="62" rx="14" fill="#FFFFFF" stroke="#2C3E50" stroke-opacity=".15"/>
    <circle cx="470" cy="304" r="10" fill="#8FA68E"/>
    <circle cx="470" cy="304" r="4" fill="#FBF8F2"/>
    <rect x="460" y="322" width="20" height="2" rx="1" fill="#2C3E50" fill-opacity=".15"/>
    <rect x="460" y="328" width="20" height="2" rx="1" fill="#2C3E50" fill-opacity=".10"/>
  </g>

  <!-- phone leaning on the table -->
  <g transform="translate(360,250) rotate(-6)">
    <rect x="0" y="0" width="72" height="132" rx="14" fill="#2C3E50"/>
    <rect x="4" y="4" width="64" height="124" rx="11" fill="#FBF8F2"/>
    <rect x="30" y="9" width="12" height="3" rx="1.5" fill="#2C3E50" fill-opacity=".3"/>
    <rect x="10" y="22" width="52" height="34" rx="6" fill="#fff" stroke="#2C3E50" stroke-opacity=".08"/>
    <circle cx="18" cy="32" r="4" fill="#8FA68E"/>
    <text x="26" y="34" font-family="-apple-system, system-ui, sans-serif" font-size="6" font-weight="700" fill="#2C3E50">Neare</text>
    <text x="14" y="48" font-family="-apple-system, system-ui, sans-serif" font-size="5" fill="#6B7280">Mum slept well.</text>
    <rect x="10" y="64" width="52" height="22" rx="6" fill="#EEF4ED"/>
    <text x="14" y="76" font-family="-apple-system, system-ui, sans-serif" font-size="4.5" font-weight="700" fill="#6E8A6D">GENTLE NUDGE</text>
    <text x="14" y="82" font-family="-apple-system, system-ui, sans-serif" font-size="4.5" fill="#2C3E50">Morning routine shifted.</text>
  </g>

  <!-- ambient dust particles -->
  <g fill="#FFF4D6" opacity=".6">
    <circle cx="720" cy="80" r="2"/>
    <circle cx="800" cy="130" r="1.5"/>
    <circle cx="680" cy="170" r="1"/>
    <circle cx="860" cy="200" r="2"/>
    <circle cx="760" cy="240" r="1.5"/>
  </g>
</svg>
