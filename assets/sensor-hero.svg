<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-label="A small Neare sensor on a side table beside a phone showing a gentle notification.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF8F2"/>
      <stop offset="1" stop-color="#ECE6DA"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2C3E50"/>
      <stop offset="1" stop-color="#1F2D3B"/>
    </linearGradient>
    <linearGradient id="sensor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#ECE6DA"/>
    </linearGradient>
    <radialGradient id="pulse" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#8FA68E" stop-opacity=".35"/>
      <stop offset="1" stop-color="#8FA68E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background panel -->
  <rect width="520" height="520" rx="36" fill="url(#bg)"/>

  <!-- soft radar pulse around sensor -->
  <circle cx="170" cy="320" r="140" fill="url(#pulse)"/>
  <circle cx="170" cy="320" r="92" fill="none" stroke="#8FA68E" stroke-opacity=".25" stroke-width="1.2"/>
  <circle cx="170" cy="320" r="62" fill="none" stroke="#8FA68E" stroke-opacity=".35" stroke-width="1.2"/>

  <!-- side table line -->
  <line x1="40" y1="392" x2="480" y2="392" stroke="#2C3E50" stroke-opacity=".10" stroke-width="1.5"/>

  <!-- sensor body -->
  <g>
    <rect x="130" y="290" width="80" height="100" rx="18" fill="url(#sensor)" stroke="#2C3E50" stroke-opacity=".12"/>
    <circle cx="170" cy="320" r="14" fill="#8FA68E"/>
    <circle cx="170" cy="320" r="6" fill="#FBF8F2"/>
    <rect x="158" y="362" width="24" height="3" rx="1.5" fill="#2C3E50" fill-opacity=".15"/>
    <rect x="158" y="370" width="24" height="3" rx="1.5" fill="#2C3E50" fill-opacity=".10"/>
  </g>

  <!-- phone -->
  <g transform="translate(280,90)">
    <rect x="0" y="0" width="180" height="340" rx="32" fill="url(#phone)"/>
    <rect x="8" y="8" width="164" height="324" rx="26" fill="#FBF8F2"/>
    <!-- notch -->
    <rect x="74" y="18" width="32" height="6" rx="3" fill="#2C3E50" fill-opacity=".25"/>
    <!-- notification card -->
    <g transform="translate(20,60)">
      <rect width="140" height="92" rx="14" fill="#fff" stroke="#2C3E50" stroke-opacity=".08"/>
      <circle cx="20" cy="22" r="9" fill="#8FA68E"/>
      <text x="36" y="26" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#2C3E50">Neare</text>
      <text x="36" y="44" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#6B7280">Just now</text>
      <text x="14" y="68" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#2C3E50">Mum slept well last night.</text>
      <text x="14" y="84" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#6B7280">Routine looks steady this week.</text>
    </g>
    <!-- second smaller card -->
    <g transform="translate(20,168)">
      <rect width="140" height="60" rx="14" fill="#EEF4ED" stroke="#8FA68E" stroke-opacity=".25"/>
      <text x="14" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="700" fill="#6E8A6D">GENTLE NUDGE</text>
      <text x="14" y="42" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#2C3E50">A small change in</text>
      <text x="14" y="54" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#2C3E50">morning routine.</text>
    </g>
  </g>
</svg>
